<!DOCTYPE html>
<html>
<head>
    <title>Smart Number App</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            width: 80%;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 20px;
            margin-top: 15px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        h2 {
            margin-bottom: 10px;
        }

        .result {
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔢 Smart Number App</h2>
        <p>Enter a number and see results</p>

        <form method="POST">
            <input type="number" name="number" placeholder="Enter number" required><br>
            <button type="submit">Check</button>
        </form>

        {% if result %}
        <div class="result">
            <h3>Result:</h3>
            <p>✔ Even/Odd: {{ result.even_odd }}</p>
            <p>✔ Prime: {{ result.prime }}</p>
            <p>✔ Factorial: {{ result.factorial }}</p>
            <p>✔ Sum of digits: {{ result.sum_digits }}</p>
        </div>
        {% endif %}
    </div>

</body>
</html>
